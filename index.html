<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBCO UNIFIED OS // BBQ TERMINAL</title>
    <style>
        :root {
            --term-green: #14fdce; 
            --term-green-dim: rgba(20, 253, 206, 0.3);
            --bg-color: #05110a;
            --font-main: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; 
        }

        body {
            background-color: var(--bg-color);
            color: var(--term-green);
            font-family: var(--font-main);
            overflow: hidden;
            text-transform: uppercase;
        }

        /* Bulletproof Dedicated Overlays */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
        }
        
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.6) 100%);
            z-index: 101;
            pointer-events: none;
        }

        .glow {
            text-shadow: 0 0 4px var(--term-green), 0 0 10px var(--term-green-dim);
        }

        /* Power On Screen */
        #power-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200; 
            font-size: 2.5rem;
            cursor: pointer;
            background-color: var(--bg-color);
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.6; text-shadow: 0 0 10px var(--term-green); }
            100% { opacity: 1; text-shadow: 0 0 30px var(--term-green), 0 0 50px var(--term-green); }
        }

        #boot-screen {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 50;
            font-size: 1.2rem;
            white-space: pre-wrap;
            line-height: 1.5;
            display: none;
        }

        /* Main Interface Wrapper */
        #main-interface {
            display: none;
            flex-direction: column;
            height: 100vh;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        header {
            border-bottom: 2px solid var(--term-green);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }

        .layout-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            height: calc(100vh - 100px); /* Account for header */
            overflow: hidden;
        }

        /* Menu Section */
        .menu-list {
            overflow-y: auto;
            padding-right: 10px;
        }

        .menu-list::-webkit-scrollbar { width: 8px; }
        .menu-list::-webkit-scrollbar-track { background: var(--bg-color); border: 1px solid var(--term-green); }
        .menu-list::-webkit-scrollbar-thumb { background: var(--term-green); }

        .menu-item {
            border: 1px solid var(--term-green-dim);
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(20, 253, 206, 0.05);
        }

        .menu-item:hover {
            background: var(--term-green);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--term-green-dim);
        }

        .item-details h3 { font-size: 1.2rem; margin-bottom: 5px; }
        .item-details p { font-size: 0.8rem; opacity: 0.8; }
        .item-price { font-size: 1.4rem; font-weight: bold; }

        /* Terminal Sidebar */
        .sidebar {
            border: 2px solid var(--term-green);
            display: flex;
            flex-direction: column;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            min-width: 350px;
        }

        .terminal-output {
            flex-grow: 1;
            font-size: 0.9rem;
            line-height: 1.4;
            margin-bottom: 15px;
            white-space: pre-wrap;
            overflow-y: auto;
            border-bottom: 1px dashed var(--term-green-dim);
            padding-bottom: 10px;
        }

        .terminal-output::-webkit-scrollbar { display: none; }

        .cart-status {
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        button {
            background: transparent;
            color: var(--term-green);
            border: 2px solid var(--term-green);
            padding: 10px;
            font-family: var(--font-main);
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.2s;
        }

        button:hover:not(:disabled) {
            background: var(--term-green);
            color: var(--bg-color);
        }

        button:disabled {
            border-color: var(--term-green-dim);
            color: var(--term-green-dim);
            cursor: not-allowed;
            background: transparent;
        }

        .cursor::after {
            content: '█';
            animation: blink 1s step-start infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="scanlines"></div>
    <div class="vignette"></div>

    <div id="power-screen" class="cursor">
        [ CLICK TO INITIALIZE TERMINAL ]
    </div>

    <div id="boot-screen" class="glow cursor"></div>

    <div id="main-interface" class="glow">
        <header>
            <h1>ROBCO INDUSTRIES UNIFIED OS v85</h1>
            <h2>VAULT 76 PROVISIONS</h2>
        </header>

        <div class="layout-grid">
            <div class="menu-list" id="menu-board">
                </div>

            <div class="sidebar">
                <div class="terminal-output cursor" id="terminal-out">> AWAITING INPUT...</div>
                
                <div class="cart-status">
                    CAPS DUE: <span id="cart-total">0</span>
                </div>
                
                <button id="execute-btn" disabled>[ DISPENSE RATIONS ]</button>
            </div>
        </div>
    </div>

    <script>
        console.log("RobCo OS Booting: JS file successfully loaded and executing.");

        const menuData = [
            { id: 1, name: "Deathclaw Brisket", desc: "Slow-roasted for 200 years. +10 END.", price: 150 },
            { id: 2, name: "Nuka-Glazed Ribs", desc: "Sticky, sweet, and slightly radioactive.", price: 250 },
            { id: 3, name: "Brahmin Sliders", desc: "Two heads are better than one.", price: 120 },
            { id: 4, name: "Mirelurk Mac & Cheese", desc: "Creamy, crunchy, aquatic.", price: 180 },
            { id: 5, name: "Crispy Iguana Bits", desc: "Don't ask what part.", price: 45 },
            { id: 6, name: "Quantum BBQ Sauce", desc: "Glows in the dark. Highly flammable.", price: 80 }
        ];

        let cart = [];
        let orderTotal = 0;
        let isSystemLocked = false; 

        const powerScreen = document.getElementById('power-screen');
        const bootScreen = document.getElementById('boot-screen');
        const mainInterface = document.getElementById('main-interface');
        const menuBoard = document.getElementById('menu-board');
        const cartTotalEl = document.getElementById('cart-total');
        const executeBtn = document.getElementById('execute-btn');
        const terminalOut = document.getElementById('terminal-out');

        let audioCtx = null;

        function getAudioContext() {
            if (!audioCtx) {
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                } catch (e) {
                    console.warn("Audio disabled by browser.");
                    return null; 
                }
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                try {
                    audioCtx.resume();
                } catch (e) {
                    console.warn("Could not resume audio.");
                }
            }
            return audioCtx;
        }

        function playBeep(freq = 600, type = 'square', duration = 0.05) {
            const ctx = getAudioContext();
            if (!ctx) return; 
            
            try {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(0.05, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            } catch (e) {}
        }

        function playGeigerTick() {
            if (isSystemLocked) return;
            playBeep(Math.random() * 2000 + 1000, 'sawtooth', 0.02);
        }

        powerScreen.addEventListener('click', () => {
            console.log("Power screen clicked. Initializing...");
            getAudioContext(); 
            powerScreen.style.display = 'none';
            bootScreen.style.display = 'block';
            runBootSequence();
        });

        const bootText = [
            "ROBCO INDUSTRIES UNIFIED OPERATING SYSTEM",
            "COPYRIGHT 2075-2077 ROBCO INDUSTRIES",
            "-Server 1-",
            "Node 3",
            "BIOS Check: OK",
            "Memory Check: 640K OK",
            "Mounting VFS... DONE",
            "Loading Vault-Tec Protocols...",
            "Initializing Provisions UI..."
        ];

        async function runBootSequence() {
            let currentText = "";
            for (let i = 0; i < bootText.length; i++) {
                currentText += bootText[i] + "\n";
                bootScreen.innerText = currentText;
                playBeep(Math.random() * 2000 + 1000, 'sawtooth', 0.02);
                await new Promise(r => setTimeout(r, Math.random() * 200 + 100));
            }
            await new Promise(r => setTimeout(r, 600));
            bootScreen.style.display = 'none';
            mainInterface.style.display = 'flex';
            renderMenu();
        }

        function renderMenu() {
            menuData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'menu-item';
                card.innerHTML = `
                    <div class="item-details">
                        <h3>${item.name}</h3>
                        <p>${item.desc}</p>
                    </div>
                    <div class="item-price">${item.price}c</div>
                `;
                
                card.addEventListener('mouseenter', playGeigerTick);
                card.addEventListener('click', () => {
                    if (!isSystemLocked) addToCart(item);
                });
                
                menuBoard.appendChild(card);
            });
        }

        function addToCart(item) {
            playBeep(800, 'square', 0.1);
            cart.push(item);
            orderTotal += item.price;
            updateCartUI();
            
            if (cart.length === 1 && terminalOut.innerText.includes("AWAITING INPUT")) {
                terminalOut.innerText = ""; 
            }
            printToTerminal(`> ADDED: ${item.name} (${item.price}c)`);
        }

        function updateCartUI() {
            cartTotalEl.innerText = orderTotal;
            executeBtn.disabled = cart.length === 0 || isSystemLocked;
        }

        async function printToTerminal(text) {
            terminalOut.innerText += '\n';
            for (let i = 0; i < text.length; i++) {
                terminalOut.innerText += text[i];
                terminalOut.scrollTop = terminalOut.scrollHeight;
                if (i % 3 === 0) playBeep(Math.random() * 2000 + 1000, 'sawtooth', 0.02);
                await new Promise(r => setTimeout(r, 15));
            }
        }

        executeBtn.addEventListener('click', async () => {
            if (cart.length === 0 || isSystemLocked) return;
            
            isSystemLocked = true;
            executeBtn.disabled = true;
            playBeep(400, 'square', 0.5);
            
            terminalOut.innerText = ""; 
            await printToTerminal("> INITIATING DISPENSARY...");
            await new Promise(r => setTimeout(r, 500));
            
            let receipt = "\n--- VAULT 76 RATIONS ---\n";
            cart.forEach(item => {
                receipt += `${item.name.padEnd(25, '.')} ${item.price}c\n`;
            });
            receipt += "------------------------\n";
            receipt += `TOTAL DEDUCTED: ${orderTotal}c\n`;
            receipt += "> DISPENSING. HAVE A VAULT-TEC DAY.";

            await printToTerminal(receipt);
            
            cart = [];
            orderTotal = 0;
            updateCartUI(); 
            
            setTimeout(() => {
                terminalOut.innerText = "> AWAITING INPUT...";
                isSystemLocked = false; 
            }, 4000);
        });
    </script>
</body>
</html>
