<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBCO UNIFIED OS // BBQ TERMINAL</title>
    <style>
        :root {
            --term-green: #14fdce; /* Classic Fallout 4 Green */
            --term-green-dim: rgba(20, 253, 206, 0.3);
            --bg-color: #05110a;
            --font-main: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--term-green);
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            text-transform: uppercase;
        }

        /* CRT Scanlines & Vignette Overlay */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
        }
        
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.6) 100%);
            z-index: 101;
            pointer-events: none;
        }

        .glow {
            text-shadow: 0 0 4px var(--term-green), 0 0 10px var(--term-green-dim);
        }

        /* Boot Screen */
        #boot-screen {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 50;
            font-size: 1.2rem;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        /* Main Interface */
        #main-interface {
            display: none;
            flex-direction: column;
            height: 100%;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        header {
            border-bottom: 2px solid var(--term-green);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }

        .layout-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            height: 100%;
            overflow: hidden;
        }

        /* Menu Section */
        .menu-list {
            overflow-y: auto;
            padding-right: 10px;
        }

        .menu-list::-webkit-scrollbar { width: 8px; }
        .menu-list::-webkit-scrollbar-track { background: var(--bg-color); border: 1px solid var(--term-green); }
        .menu-list::-webkit-scrollbar-thumb { background: var(--term-green); }

        .menu-item {
            border: 1px solid var(--term-green-dim);
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(20, 253, 206, 0.05);
        }

        .menu-item:hover {
            background: var(--term-green);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--term-green-dim);
        }

        .item-details h3 { font-size: 1.2rem; margin-bottom: 5px; }
        .item-details p { font-size: 0.8rem; opacity: 0.8; }
        .item-price { font-size: 1.4rem; font-weight: bold; }

        /* Terminal Sidebar */
        .sidebar {
            border: 2px solid var(--term-green);
            display: flex;
            flex-direction: column;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
        }

        .terminal-output {
            flex-grow: 1;
            font-size: 0.9rem;
            line-height: 1.4;
            margin-bottom: 15px;
            white-space: pre-wrap;
            overflow-y: auto;
            border-bottom: 1px dashed var(--term-green-dim);
            padding-bottom: 10px;
        }

        .cart-status {
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        button {
            background: transparent;
            color: var(--term-green);
            border: 2px solid var(--term-green);
            padding: 10px;
            font-family: var(--font-main);
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        button:hover:not(:disabled) {
            background: var(--term-green);
            color: var(--bg-color);
        }

        button:disabled {
            border-color: var(--term-green-dim);
            color: var(--term-green-dim);
            cursor: not-allowed;
        }

        /* Blinking Cursor */
        .cursor::after {
            content: '█';
            animation: blink 1s step-start infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="boot-screen" class="glow cursor"></div>

    <div id="main-interface" class="glow">
        <header>
            <h1>ROBCO INDUSTRIES UNIFIED OS v85</h1>
            <h2>VAULT 76 PROVISIONS</h2>
        </header>

        <div class="layout-grid">
            <div class="menu-list" id="menu-board">
                </div>

            <div class="sidebar">
                <div class="terminal-output cursor" id="terminal-out">
> AWAITING INPUT...
                </div>
                
                <div class="cart-status">
                    CAPS DUE: <span id="cart-total">0</span>
                </div>
                
                <button id="execute-btn" disabled>[ DISPENSE RATIONS ]</button>
            </div>
        </div>
    </div>

    <script>
        // Data
        const menuData = [
            { id: 1, name: "Deathclaw Brisket", desc: "Slow-roasted for 200 years. +10 END.", price: 150 },
            { id: 2, name: "Nuka-Glazed Ribs", desc: "Sticky, sweet, and slightly radioactive.", price: 250 },
            { id: 3, name: "Brahmin Sliders", desc: "Two heads are better than one.", price: 120 },
            { id: 4, name: "Mirelurk Mac & Cheese", desc: "Creamy, crunchy, aquatic.", price: 180 },
            { id: 5, name: "Crispy Iguana Bits", desc: "Don't ask what part.", price: 45 },
            { id: 6, name: "Quantum BBQ Sauce", desc: "Glows in the dark. Highly flammable.", price: 80 }
        ];

        let cart = [];
        let orderTotal = 0;
        let isPrinting = false;

        // DOM Elements
        const bootScreen = document.getElementById('boot-screen');
        const mainInterface = document.getElementById('main-interface');
        const menuBoard = document.getElementById('menu-board');
        const cartTotalEl = document.getElementById('cart-total');
        const executeBtn = document.getElementById('execute-btn');
        const terminalOut = document.getElementById('terminal-out');

        // Audio System (Synthesized directly in browser)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playBeep(freq = 600, type = 'square', duration = 0.05) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playGeigerTick() {
            playBeep(Math.random() * 2000 + 1000, 'sawtooth', 0.02);
        }

        // Boot Sequence Logic
        const bootText = [
            "ROBCO INDUSTRIES UNIFIED OPERATING SYSTEM",
            "COPYRIGHT 2075-2077 ROBCO INDUSTRIES",
            "-Server 1-",
            "Node 3",
            "BIOS Check: OK",
            "Memory Check: 640K OK",
            "Mounting VFS... DONE",
            "Loading Vault-Tec Protocols...",
            "Initializing Provisions UI..."
        ];

        async function runBootSequence() {
            let currentText = "";
            for (let i = 0; i < bootText.length; i++) {
                currentText += bootText[i] + "\n";
                bootScreen.innerText = currentText;
                playGeigerTick();
                await new Promise(r => setTimeout(r, Math.random() * 200 + 100));
            }
            await new Promise(r => setTimeout(r, 600));
            bootScreen.style.display = 'none';
            mainInterface.style.display = 'flex';
            renderMenu();
        }

        // UI Logic
        function renderMenu() {
            menuData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'menu-item';
                card.innerHTML = `
                    <div class="item-details">
                        <h3>${item.name}</h3>
                        <p>${item.desc}</p>
