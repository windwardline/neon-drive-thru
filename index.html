<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hill Valley Midnight BBQ</title>
    <style>
        :root {
            --bg-dark: #110d0d;
            --rust: #5c2a18;
            --iron: #2c2c2c;
            --neon-pink: #ff00a0;
            --neon-blue: #00f3ff;
            --neon-orange: #ff5e00;
            --font-display: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 0%, #2a1111 0%, transparent 50%),
                repeating-linear-gradient(45deg, #000 0, #000 2px, #111 2px, #111 4px);
            color: #fff;
            font-family: var(--font-display);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding-top: 2rem;
        }

        /* The Shake Animation for Order Execution */
        @keyframes systemShake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .shake {
            animation: systemShake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        /* True Neon Text Utility Classes */
        .neon-title {
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 
                0 0 2px #fff,
                0 0 10px #fff,
                0 0 20px var(--neon-pink),
                0 0 40px var(--neon-pink),
                0 0 80px var(--neon-pink),
                0 0 100px var(--neon-pink);
            margin-bottom: 2rem;
            text-align: center;
        }

        .neon-orange {
            color: #fff;
            text-shadow: 
                0 0 2px #fff,
                0 0 5px var(--neon-orange),
                0 0 15px var(--neon-orange),
                0 0 30px var(--neon-orange);
        }

        /* Menu Board */
        .menu-board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            width: 90%;
            max-width: 1000px;
            z-index: 10;
        }

        .menu-item {
            background: linear-gradient(135deg, var(--iron), #1a1a1a);
            border: 4px solid var(--rust);
            border-radius: 8px;
            padding: 1.5rem;
            position: relative;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 
                inset 0 0 20px #000,
                5px 5px 15px rgba(0,0,0,0.8);
        }

        .menu-item:active {
            transform: translateY(4px);
            box-shadow: inset 0 0 30px #000, 1px 1px 5px rgba(0,0,0,0.8);
        }

        .item-name {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
        }

        .item-desc {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 1rem;
        }

        .item-price {
            font-size: 1.5rem;
            font-weight: bold;
            text-align: right;
        }

        /* Dashboard and Telegraph Controller */
        .dashboard {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--iron);
            border-top: 5px solid var(--rust);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
        }

        .cart-status {
            font-size: 1.5rem;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .telegraph-btn {
            background: var(--rust);
            color: #fff;
            border: 2px solid #ffaa00;
            padding: 1rem 3rem;
            font-size: 1.5rem;
            font-family: var(--font-display);
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 0 15px var(--neon-orange), inset 0 0 10px #000;
            text-shadow: 0 0 5px #ffaa00;
            transition: all 0.2s;
        }

        .telegraph-btn:hover {
            background: #7a3a20;
            box-shadow: 0 0 25px var(--neon-orange), inset 0 0 10px #000;
        }

        .telegraph-btn:disabled {
            background: #333;
            border-color: #555;
            box-shadow: none;
            color: #777;
            text-shadow: none;
            cursor: not-allowed;
        }

        /* ASCII Receipt Printer Overlay */
        .receipt-container {
            position: fixed;
            top: -100%;
            left: 50%;
            transform: translateX(-50%);
            background: #fffbe6;
            color: #111;
            padding: 2rem;
            width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            z-index: 50;
            font-weight: bold;
            transition: top 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-bottom: 3px dashed #ccc;
        }

        .receipt-container.printed {
            top: 10%;
        }

        .receipt-container pre {
            white-space: pre-wrap;
            font-size: 1rem;
            line-height: 1.4;
        }

        .close-receipt {
            margin-top: 1rem;
            background: #111;
            color: #fff;
            border: none;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-family: var(--font-display);
            width: 100%;
        }

    </style>
</head>
<body>

    <div class="neon-title">Midnight BBQ Provisions</div>

    <div class="menu-board" id="menu-board">
        </div>

    <div class="dashboard">
        <div class="cart-status">
            TOTAL: $<span id="cart-total" class="neon-orange">0.00</span> 
            [ <span id="cart-count">0</span> ITEMS ]
        </div>
        <button id="execute-btn" class="telegraph-btn" disabled>Transmit Order</button>
    </div>

    <div class="receipt-container" id="receipt-container">
        <pre id="receipt-text"></pre>
        <button class="close-receipt" onclick="resetSystem()">Acknowledge & Clear</button>
    </div>

    <script>
        // 1. Database & State Management
        const menuData = [
            { id: 1, name: "Holographic Pulled Pork Egg Rolls", desc: "Crispy outer shell, slow-smoked digital pork inside.", price: 12.50 },
            { id: 2, name: "Cybernetic St. Louis Ribs", desc: "Half rack, hickory smoked, coated in glowing agave glaze.", price: 24.00 },
            { id: 3, name: "Smoked Brisket Sandwich", desc: "14-hour smoke, served on a rusted iron-skillet brioche.", price: 18.75 },
            { id: 4, name: "Photon BBQ Chicken", desc: "Pulled chicken drenched in localized thermal sauce.", price: 15.00 }
        ];

        let cart = [];
        let orderTotal = 0;

        // 2. DOM Elements
        const menuBoard = document.getElementById('menu-board');
        const cartTotalEl = document.getElementById('cart-total');
        const cartCountEl = document.getElementById('cart-count');
        const executeBtn = document.getElementById('execute-btn');
        const receiptContainer = document.getElementById('receipt-container');
        const receiptText = document.getElementById('receipt-text');

        // 3. Audio Context (Synthesized Steam Hiss & Clicks)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playClick() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function playSteamHiss() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const bufferSize = audioCtx.sampleRate * 2; 
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1; // White noise
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const bandpass = audioCtx.createBiquadFilter();
            bandpass.type = 'bandpass';
            bandpass.frequency.value = 1000;
            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
            
            noise.connect(bandpass);
            bandpass.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            noise.start();
        }

        // 4. UI Initialization
        function renderMenu() {
            menuData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'menu-item';
                card.innerHTML = `
                    <div class="item-name">${item.name}</div>
                    <div class="item-desc">${item.desc}</div>
                    <div class="item-price neon-orange">$${item.price.toFixed(2)}</div>
                `;
                card.addEventListener('click', () => addToCart(item));
                menuBoard.appendChild(card);
            });
        }

        function addToCart(item) {
            playClick();
            cart.push(item);
            updateCartUI();
        }

        function updateCartUI() {
            orderTotal = cart.reduce((sum, item) => sum + item.price, 0);
            cartTotalEl.innerText = orderTotal.toFixed(2);
            cartCountEl.innerText = cart.length;
            executeBtn.disabled = cart.length === 0;
        }

        // 5. Order Execution Sequence
        executeBtn.addEventListener('click', () => {
            if (cart.length === 0) return;
            
            // Trigger visual and audio effects
            document.body.classList.add('shake');
            playSteamHiss();
            
            setTimeout(() => {
                document.body.classList.remove('shake');
                generateReceipt();
            }, 600);
        });

        function generateReceipt() {
            let receiptStr = "================================\n";
            receiptStr += "      HILL VALLEY BBQ 1885      \n";
            receiptStr += "================================\n\n";
            
            cart.forEach(item => {
                let nameStr = item.name.substring(0, 22).padEnd(23, '.');
                receiptStr += `${nameStr} $${item.price.toFixed(2)}\n`;
            });
            
            receiptStr += "\n--------------------------------\n";
            receiptStr += `TOTAL DUE............... $${orderTotal.toFixed(2)}\n`;
            receiptStr += "================================\n";
            receiptStr += "  TRANSMISSION SUCCESSFUL  \n";

            receiptText.innerText = receiptStr;
            receiptContainer.classList.add('printed');
        }

        function resetSystem() {
            playClick();
            cart = [];
            updateCartUI();
            receiptContainer.classList.remove('printed');
        }

        // Boot
        renderMenu();

    </script>
</body>
</html>
